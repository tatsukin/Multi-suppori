<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ぴったり素材診断</title>
  
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-P4NPF5TX2H'); 
  </script>

  <script src="https://cdn.tailwindcss.com"></script>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50">
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    // --- アイコン ---
    const Sun = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2"/><path d="M12 20v2"/><path d="m4.93 4.93 1.41 1.41"/><path d="m17.66 17.66 1.41 1.41"/><path d="M2 12h2"/><path d="M20 12h2"/><path d="m6.34 17.66-1.41 1.41"/><path d="m19.07 4.93-1.41 1.41"/></svg>;
    const Wind = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12.8 19.6A2 2 0 1 0 14 16H2"/><path d="M17.5 8a2.5 2.5 0 1 0 2-4H2"/><path d="M9.8 12H2"/></svg>;
    const Sparkles = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M7 5H3"/><path d="M21 17v4"/><path d="M23 19h-4"/></svg>;
    const Droplets = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M7 16.3c2.2 0 4-1.83 4-4.05 0-1.16-.57-2.26-1.71-3.19S7 2.9 7 2.9s-2.29 6.16-2.29 6.16a4.54 4.54 0 0 0-1.71 3.19c0 2.22 1.8 4.05 4 4.05z"/><path d="M12.56 6.6A10.97 10.97 0 0 0 14 10c2 2.5 2 4.9 2 6.8 0 2.87-2.33 5.2-5.2 5.2-2.87 0-5.2-2.33-5.2-5.2 0-.25.02-.5.06-.75"/><path d="M20 9.2c0-1.35-1.1-2.45-2.45-2.45-.48 0-.94.13-1.35.39.22.45.36.95.36 1.48 0 1.95-1.55 3.5-3.5 3.5-.53 0-1.03-.14-1.48-.36.26.41.39.87.39 1.35 0 1.35-1.1 2.45-2.45 2.45-.16 0-.31-.02-.46-.04A5.2 5.2 0 0 0 14 19.8c2.87 0 5.2-2.33 5.2-5.2 0-2-.02-3.8-1.2-5.4"/></svg>;
    const MapPin = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 10c0 4.993-5.539 10.193-7.399 11.799a1 1 0 0 1-1.202 0C9.539 20.193 4 15 4 10a8 8 0 0 1 16 0"/><circle cx="12" cy="10" r="3"/></svg>;
    const ShoppingCart = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="8" cy="21" r="1"/><circle cx="19" cy="21" r="1"/><path d="M2.05 2.05h2l2.66 12.42a2 2 0 0 0 2 1.58h9.78a2 2 0 0 0 1.95-1.57l1.65-7.43H5.12"/></svg>;
    const Search = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>;
    const ChevronRight = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m9 18 6-6-6-6"/></svg>;
    const ChevronLeft = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m15 18-6-6 6-6"/></svg>;
    const RefreshCw = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>;
    const ThumbsUp = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M7 10v12"/><path d="M15 5.88 14 10h5.83a2 2 0 0 1 1.92 2.56l-2.33 8A2 2 0 0 1 17.5 22H4a2 2 0 0 1-2-2v-8a2 2 0 0 1 2-2h2.76a2 2 0 0 0 1.79-1.11L12 2h0a3.13 3.13 0 0 1 3 3.88Z"/></svg>;
    const Check = ({className}) => <svg className={className} xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 6 9 17l-5-5"/></svg>;

    const STORE_NAME = "草加店";

    const RESULTS = {
      cotton: {
        name: '綿',
        icon: <Sun className="w-12 h-12 text-orange-500 mb-2 mx-auto" />,
        catchphrase: '肌への優しさと吸水性はNo.1！',
        description: 'オールシーズン快適に使える王道のシーツです。寝汗をしっかり吸い取り、自然なやわらかさであなたを包み込みます。「オーガニックコットン」や「ホテルスタイル」など選択肢も豊富です。',
        searchQuery: 'マルチすっぽりシーツ 綿',
        products: [
          { name: 'マルチすっぽりシーツ2 コットンウォッシュ', code: '7518116', aisle: '123' },
          { name: 'マルチすっぽりシーツ ニット', code: '7524384', aisle: '122' },
          { name: 'マルチすっぽりシーツMJ06', code: '2115100101101', aisle: '124' }
        ]
      },
      linen: {
        name: '麻',
        icon: <Wind className="w-12 h-12 text-teal-600 mb-2 mx-auto" />,
        catchphrase: '通気性と吸水速乾性はトップクラス！',
        description: 'サラッとしたシャリ感があり、汗をかいても肌に張り付きません。ニトリの「フレンチリネン混」などは、使い込むほどに柔らかく肌に馴染む、育てていくシーツです。',
        searchQuery: 'マルチすっぽりシーツ 麻',
        products: [
          { name: 'マルチすっぽりシーツリネン', code: '7524477', aisle: '121' }
        ]
      },
      poly: {
        name: 'ポリエステル',
        icon: <Sparkles className="w-12 h-12 text-blue-500 mb-2 mx-auto" />,
        catchphrase: '圧倒的な扱いやすさとコスパ！',
        description: '「シワになりにくい」「乾きやすい」加工がされているものが多く、忙しい毎日の家事の時短になります。柄やカラー展開も豊富で、お部屋の模様替えにも最適です。',
        searchQuery: 'マルチすっぽりシーツ ポリエステル',
        products: [
          { name: 'マルチすっぽりシーツ38', code: '7526244', aisle: '120' },
          { name: 'マルチすっぽりシーツMJ04', code: '2115100019888', aisle: '121' },
          { name: 'マルチすっぽりシーツMJ07', code: '2115100117881', aisle: '306' }
        ]
      },
      rayon: {
        name: 'レーヨン',
        icon: <Droplets className="w-12 h-12 text-indigo-500 mb-2 mx-auto" />,
        catchphrase: 'しっとりなめらかな肌触りと究極の機能性！',
        description: '「Nクール(接触冷感)」のなめらかさや、「Nウォーム(吸湿発熱)」のじんわりとした暖かさを生み出す魔法の素材。季節のお悩み解決と、極上のとろみ感を両立したい方に最適です。',
        searchQuery: 'マルチすっぽりシーツ レーヨン Nシリーズ',
        products: [
          { name: 'マルチすっぽりシーツNfit', code: '2115100003610', aisle: '121' }
        ]
      }
    };

    const QUESTIONS = [
      {
        title: 'Q1. シーツに一番求める「肌触り・質感」はどれですか？',
        options: [
          { text: 'やわらかく、ホッとするような自然で優しい感触', points: { cotton: 1 } },
          { text: 'サラッとしていて、肌にまとわりつかない「シャリ感」', points: { linen: 1 } },
          { text: '軽くてツルッとしている、またはサラサラな感触', points: { poly: 1 } },
          { text: 'しっとりなめらかで、肌に吸い付くようなとろみ感', points: { rayon: 1 } }
        ]
      },
      {
        title: 'Q2. 特に重視したい「機能」はどれですか？',
        options: [
          { text: '寝汗をしっかり吸収して、布団の中のムレを防ぎたい', points: { cotton: 1 } },
          { text: '洗濯したら、とにかく早く乾いて家事をラクにしたい', points: { poly: 1 } },
          { text: '汗を吸い取りつつ、熱を逃がして通気性を良くしたい', points: { linen: 1 } },
          { text: '季節に合わせて「ひんやり(夏)」や「あったか(冬)」が欲しい', points: { rayon: 1 } }
        ]
      },
      {
        title: 'Q3. シーツの「特性・特徴」について、あなたに合うのは？',
        options: [
          { text: '絶対にシワになりにくいのがいい！パッと被せるだけで綺麗にしたい', points: { poly: 1 } },
          { text: '多少のシワは「天然素材ならではの自然な風合い」として楽しみたい', points: { linen: 1, cotton: 1 } },
          { text: '上質な肌触りを保てるなら、洗濯ネットに入れるくらいの手間はOK', points: { rayon: 1 } }
        ]
      },
      {
        title: 'Q4. 最後に、好みの「デザインやテイスト」はどれですか？',
        options: [
          { text: 'どんな部屋にも馴染む、飽きのこないシンプルな無地', points: { cotton: 1, linen: 1 } },
          { text: '部屋のアクセントになる柄物や、豊富なカラーから選びたい', points: { poly: 1 } },
          { text: 'ホテルのベッドのような、上品な光沢感やストライプ柄が良い', points: { cotton: 1 } }
        ]
      }
    ];

    function App() {
      const [currentQuestion, setCurrentQuestion] = useState(0);
      const [answers, setAnswers] = useState([]); 
      const [result, setResult] = useState(null);
      const [hasUnderstood, setHasUnderstood] = useState(false);

      const handleAnswer = (points) => {
        const newAnswers = [...answers, points];
        setAnswers(newAnswers);

        if (typeof window !== 'undefined' && window.gtag) {
          const selectedMaterial = Object.keys(points)[0];
          window.gtag('event', `Q${currentQuestion + 1}_${selectedMaterial}`);
        }

        if (currentQuestion < QUESTIONS.length - 1) {
          setCurrentQuestion(currentQuestion + 1);
        } else {
          calculateResult(newAnswers);
        }
      };

      const handleBack = () => {
        if (currentQuestion > 0) {
          const newAnswers = [...answers];
          newAnswers.pop(); 
          setAnswers(newAnswers);
          setCurrentQuestion(currentQuestion - 1);
          
          if (typeof window !== 'undefined' && window.gtag) {
            window.gtag('event', 'click_back'); 
          }
        }
      };

      const calculateResult = (finalAnswers) => {
        const finalScores = { cotton: 0, linen: 0, poly: 0, rayon: 0 };
        finalAnswers.forEach(points => {
          Object.keys(points).forEach(key => {
            finalScores[key] += points[key];
          });
        });

        const hierarchy = ['rayon', 'cotton', 'poly', 'linen'];
        let bestMaterial = hierarchy[0];
        let maxScore = -1;

        hierarchy.forEach(mat => {
          if (finalScores[mat] > maxScore) {
            maxScore = finalScores[mat];
            bestMaterial = mat;
          }
        });

        setResult(bestMaterial);
        
        if (typeof window !== 'undefined' && window.gtag) {
          window.gtag('event', `result_${bestMaterial}`);
        }
      };

      const handleUnderstood = () => {
        if (typeof window !== 'undefined' && window.gtag) {
          window.gtag('event', 'click_understood');
        }
        setHasUnderstood(true);
      };

      const handleNitoriNetClick = (productCode = null) => {
        if (typeof window !== 'undefined' && window.gtag) {
          window.gtag('event', 'click_nitorinet'); 
          if (productCode) {
            window.gtag('event', `click_nitorinet_${productCode}`);
          }
        }
        
        if (productCode) {
          window.open(`https://www.nitori-net.jp/ec/product/${productCode}/`, '_blank');
        } else {
          const query = RESULTS[result].searchQuery;
          window.open(`https://www.nitori-net.jp/ec/search/?q=${encodeURIComponent(query)}`, '_blank');
        }
      };

      const resetQuiz = () => {
        setCurrentQuestion(0);
        setAnswers([]); 
        setResult(null);
        setHasUnderstood(false);
        if (typeof window !== 'undefined' && window.gtag) {
          window.gtag('event', 'click_reset'); 
          window.gtag('event', 'tap_start');
        }
      };

      return (
        <div className="min-h-screen p-4 flex items-center justify-center">
          <div className="max-w-md w-full bg-white rounded-2xl shadow-xl overflow-hidden border border-gray-100">
            <div className="bg-teal-600 p-5 text-white text-center relative overflow-hidden">
              <div className="absolute top-0 right-0 opacity-10 transform translate-x-1/4 -translate-y-1/4">
                <Sun className="w-32 h-32" />
              </div>
              <h1 className="text-2xl font-bold relative z-10 tracking-wide">ぴったり素材診断</h1>
              <p className="text-teal-100 text-sm mt-1 relative z-10">あなたのお悩みを解決するシーツは？</p>
            </div>

            <div className="p-6">
              {!result ? (
                <div>
                  <div className="mb-6 flex justify-between items-center text-sm font-bold text-teal-600">
                    <span className="bg-teal-50 px-3 py-1 rounded-full border border-teal-100">
                      質問 {currentQuestion + 1} / {QUESTIONS.length}
                    </span>
                    <div className="flex space-x-1">
                      {QUESTIONS.map((_, idx) => (
                        <div key={idx} className={`h-2 w-8 rounded-full ${idx <= currentQuestion ? 'bg-teal-500' : 'bg-gray-200'}`} />
                      ))}
                    </div>
                  </div>
                  <h2 className="text-xl font-bold text-gray-800 mb-6 leading-relaxed">
                    {QUESTIONS[currentQuestion].title}
                  </h2>
                  <div className="space-y-3">
                    {QUESTIONS[currentQuestion].options.map((option, index) => (
                      <button
                        key={index}
                        onClick={() => handleAnswer(option.points)}
                        className="w-full text-left p-4 rounded-xl border-2 border-gray-100 hover:border-teal-500 hover:bg-teal-50 transition-all duration-200 flex items-center justify-between group shadow-sm hover:shadow"
                      >
                        <span className="text-gray-700 font-medium pr-4 leading-snug">{option.text}</span>
                        <ChevronRight className="w-5 h-5 text-gray-300 group-hover:text-teal-500 flex-shrink-0" />
                      </button>
                    ))}
                  </div>

                  {currentQuestion > 0 && (
                    <div className="mt-6 text-center animate-fade-in">
                      <button
                        onClick={handleBack}
                        className="text-gray-400 hover:text-teal-600 text-sm font-medium flex items-center justify-center mx-auto transition-colors"
                      >
                        <ChevronLeft className="w-4 h-4 mr-1" />
                        前の質問に戻る
                      </button>
                    </div>
                  )}
                </div>
              ) : (
                <div className="animate-fade-in">
                  <div className="bg-white p-6 rounded-2xl shadow-lg text-center border-2 border-teal-500 mb-6 relative">
                    {RESULTS[result].icon}
                    <h2 className="text-2xl font-bold text-gray-800 mb-2">あなたにぴったりの素材は「{RESULTS[result].name}」</h2>
                    <p className="text-teal-600 font-bold mb-4">{RESULTS[result].catchphrase}</p>
                    <p className="text-gray-600 text-sm leading-relaxed text-left">
                      {RESULTS[result].description}
                    </p>
                  </div>

                  <div className="mb-6">
                    <h3 className="text-lg font-bold text-gray-800 mb-4 flex items-center justify-center">
                      <MapPin className="w-5 h-5 text-red-500 mr-1" />
                      {STORE_NAME}のおすすめ商品と売場
                    </h3>
                    <div className="space-y-3">
                      {RESULTS[result].products.map((product, index) => (
                        <div key={index} className="bg-white p-4 rounded-xl shadow-sm border border-gray-200 text-left relative overflow-hidden">
                          <div className="absolute left-0 top-0 bottom-0 w-1 bg-teal-500"></div>
                          <div className="flex justify-between items-start mb-1 pl-2">
                            <h4 className="font-bold text-gray-800 text-sm pr-2 leading-tight">{product.name}</h4>
                            <span className="bg-red-100 text-red-700 text-xs font-bold px-2 py-1 rounded whitespace-nowrap shadow-sm border border-red-200">
                              📍 {product.aisle}通路
                            </span>
                          </div>
                          <p className="text-xs text-gray-400 mb-3 pl-2">商品コード: {product.code}</p>
                          <div className="pl-2">
                            <button
                              onClick={() => handleNitoriNetClick(product.code)}
                              className="w-full bg-blue-50 hover:bg-blue-100 text-blue-700 font-bold py-2 px-4 rounded-lg flex items-center justify-center transition-colors text-sm border border-blue-200"
                            >
                              <ShoppingCart className="w-4 h-4 mr-2" />
                              この商品をネットで見る
                            </button>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>

                  <div className="space-y-3">
                    <button
                      onClick={handleUnderstood}
                      className={`w-full font-bold py-4 px-6 rounded-xl shadow-lg flex items-center justify-center transition-all duration-300 ${
                        hasUnderstood ? 'bg-gray-400 text-white cursor-default' : 'bg-orange-500 hover:bg-orange-600 text-white hover:scale-105'
                      }`}
                      disabled={hasUnderstood}
                    >
                      {hasUnderstood ? (
                        <>
                          <Check className="w-5 h-5 mr-2" />
                          売場で探してみます！
                        </>
                      ) : (
                        <>
                          <ThumbsUp className="w-5 h-5 mr-2" />
                          👍 わかった！（店舗で探す）
                        </>
                      )}
                    </button>

                    <button
                      onClick={() => handleNitoriNetClick()}
                      className="w-full bg-white hover:bg-gray-50 text-teal-600 font-bold py-4 px-6 rounded-xl shadow border-2 border-teal-500 flex items-center justify-center transition-colors"
                    >
                      <Search className="w-5 h-5 mr-2" />
                      ニトリネットで{RESULTS[result].name}をすべて見る
                    </button>
                  </div>

                  <div className="mt-8 text-center">
                    <button
                      onClick={resetQuiz}
                      className="text-gray-400 hover:text-teal-600 text-sm font-medium flex items-center justify-center mx-auto transition-colors"
                    >
                      <RefreshCw className="w-4 h-4 mr-1" />
                      最初からやり直す
                    </button>
                  </div>
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
